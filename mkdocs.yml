site_name: eolas
site_description: Python (eolas-data) and R (eolas) clients for the eolas.fyi statistical data API
site_url: https://docs.eolas.fyi
repo_url: https://github.com/phildonovan/eolas-data
repo_name: eolas-data

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting started: quickstart.md
  - Sync guide: sync-guide.md
  - Authentication: authentication.md
  - Data sources:
    - Overview: sources/index.md
    - Stats NZ: sources/statsnz.md
    - OECD: sources/oecd.md
    - RBNZ: sources/rbnz.md
    - LINZ: sources/linz.md
    - NZ Treasury: sources/treasury.md
    - MBIE: sources/mbie.md
    - Immigration NZ: sources/immigration.md
    - Waka Kotahi / NZTA: sources/nzta.md
    - DOC: sources/doc.md
    - Manaaki Whenua / LRIS: sources/lris.md
    - ACC: sources/acc.md
    - MSD: sources/msd.md
    - Education Counts: sources/education-counts.md
    - NZ Police / MoJ: sources/police-moj.md
    - WorkSafe NZ: sources/worksafe.md
    - EECA: sources/eeca.md
    - Charities Services: sources/charities.md
    - GeoNet: sources/geonet.md
    - PHARMAC: sources/pharmac.md
    - Councils:
      - Overview: sources/councils.md
      - Auckland Council: sources/auckland-council.md
      - Auckland Transport: sources/auckland-transport.md
      - Wellington Region: sources/wellington.md
      - ECan / Canterbury: sources/canterbury.md
      - Bay of Plenty: sources/bay-of-plenty.md
      - Co-Lab Waikato: sources/colab-waikato.md
      - Otago: sources/otago.md
      - Hawke's Bay: sources/hawkes-bay.md
      - Manawatū-Whanganui: sources/manawatu-whanganui.md
      - Northland: sources/northland.md
      - Southland: sources/southland.md
      - Taranaki: sources/taranaki.md
      - Gisborne / Top of South: sources/top-of-south.md
      - West Coast: sources/west-coast.md
      - Napier + Whanganui: sources/napier-whanganui.md
  - Python:
    - Overview: python/index.md
    - API reference: python/reference.md
  - R:
    - Overview: r/index.md
    - API reference: r/reference.md
  - CLI:
    - Reference: cli/index.md
  - Bulk downloads: bulk-downloads.md
  - Examples: examples/index.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

plugins:
  - search
  - macros:
      module_name: macros

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phildonovan/eolas-data
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/eolas-data/
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: Yes
          data: 1
          note: Thanks for the feedback!
        - icon: material/thumb-down-outline
          name: No
          data: 0
          note: Thanks — we'll work on improving this.

extra_css:
  - stylesheets/extra.css
