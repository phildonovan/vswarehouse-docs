site_name: eolas
site_description: Python (eolas-data) and R (eolas) clients for the eolas.fyi statistical data API
site_url: https://docs.eolas.fyi
repo_url: https://github.com/phildonovan/eolas-data
repo_name: eolas-data

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting started: quickstart.md
  - Python:
    - Overview: python/index.md
    - API reference: python/reference.md
  - R:
    - Overview: r/index.md
    - API reference: r/reference.md
  - CLI:
    - Reference: cli/index.md
  - Examples: examples/index.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

plugins:
  - search
  - macros:
      module_name: macros

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phildonovan/eolas-data
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/eolas-data/
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: Yes
          data: 1
          note: Thanks for the feedback!
        - icon: material/thumb-down-outline
          name: No
          data: 0
          note: Thanks — we'll work on improving this.

extra_css:
  - stylesheets/extra.css
